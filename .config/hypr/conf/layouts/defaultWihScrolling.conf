# -----------------------------------------------------
# Layouts
# -----------------------------------------------------

dwindle {
    pseudotile = true
    preserve_split = true
}

binds {
  workspace_back_and_forth = false
  allow_workspace_cycles = true
  pass_mouse_when_bound = false
}

scrolling {
    column_width = 1
    focus_fit_method = 1
    fullscreen_on_one_column = true
    direction = right
    follow_min_visible = 0.4
}

workspace = 1, layout:scrolling
