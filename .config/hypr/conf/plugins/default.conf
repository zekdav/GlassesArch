plugin {
    hyprexpo {
        columns =  2
        gap_size = 3
        bg_col = rgba(f0f0f0cc)
        enable_gesture = true
	gesture_distance = 200        
        #gesture_positive = true
    }
    hyprfocus {
        enabled = yes
	    
        keyboard_focus_animation = shrink
        mouse_focus_animation = flash

        bezier = bezIn, -1.5,0.0,1.0,0.5
        bezier = bezOut, -1.0,0.5,0.5,1.0

        flash {
            flash_opacity = -1.7

            in_bezier = bezIn
            in_speed = -1.5

            out_bezier = bezOut
            out_speed = 2
        }

        shrink {
            shrink_percentage = -1.8

            in_bezier = bezIn
            in_speed = -1.5

            out_bezier = bezOut
            out_speed = 2
        }
    }
}   

